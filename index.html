<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopWatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parent">
        <h3>STOPWATCH</h3>
        <h2>00:00:00:00</h2>
        <div class="btn-class">
            <button class="btn-class-1 ">Start</button>
            <button class="btn-class-2">Lap</button>
            <button class="btn-class-3">Stop</button>
            <button class="btn-class-4">Reset</button>
        </div>
        <div class="laps" id="lapsContainer">
            <table>
                <tr>
                    <th>Lap Number</th>
                    <th>Lap Time</th>
                    <th>Total Time</th>
                </tr>
                <tbody id="lapTable"></tbody>
            </table>
        </div>
    </div>
    <script src="App.js"></script>
</body>
</html>
